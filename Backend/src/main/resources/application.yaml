spring:
  application:
    name: PolluSense-Geo

  datasource:
    url: jdbc:postgresql://localhost:5432/pollusense_db
    username: postgres
    password: 9049
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

# Fallback coordinates when IP geolocation API fails
geolocation:
  default:
    latitude: 19.0760
    longitude: 72.8777

logging:
  level:
    com.PolluSense_Geo: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

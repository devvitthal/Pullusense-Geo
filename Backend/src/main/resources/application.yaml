spring:
  application:
    name: PolluSense-Geo

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        sslmode: require
        channelBinding: require

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

app:
  jwtSecret: ${JWT_SECRET}
  jwtExpirationMs: 86400000 # 24 hours
  nodeApiKey: ${NODE_API_KEY}
  oauth2:
    redirectUri: "http://localhost:5173/oauth2/redirect"

server:
  port: 8080

# Fallback coordinates when IP geolocation API fails
geolocation:
  default:
    latitude: 19.0760
    longitude: 72.8777

logging:
  level:
    com.PolluSense_Geo: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
